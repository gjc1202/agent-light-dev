[platformio]
src_dir = .
default_envs = esp32c3

[env:esp32c3]
; 官方 PlatformIO 不支持 arduino-esp32 v3.x，要用社区 fork pioarduino。
; v3 的 LEDC API（ledcAttachChannel / ledcWriteChannel）才支持 GPIO10 PWM。
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
upload_speed = 921600
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
